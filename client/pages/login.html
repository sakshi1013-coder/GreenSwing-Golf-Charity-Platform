<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your GreenSwing account. Access your dashboard, manage scores, and track your charity impact.">
  <title>Log In — GreenSwing</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <a href="../index.html" class="auth-logo" id="auth-logo">
        <span class="logo-icon">⛳</span>
        GreenSwing
      </a>

      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your account and check your draw results</p>
        </div>

        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <div class="form-input-icon">
              <span class="icon"><i class="fas fa-envelope"></i></span>
              <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="form-input-icon">
              <span class="icon"><i class="fas fa-lock"></i></span>
              <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required style="padding-right: 3rem;">
            </div>
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>

          <div class="auth-options">
            <label class="auth-remember">
              <input type="checkbox" id="remember-me">
              Remember me
            </label>
            <a href="#" class="auth-forgot" id="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="login-submit" style="width: 100%;">
            <i class="fas fa-sign-in-alt"></i>
            Sign In
          </button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <div class="auth-social-btns">
          <button class="auth-social-btn" id="social-google">
            <i class="fab fa-google"></i>
            Google
          </button>
          <button class="auth-social-btn" id="social-apple">
            <i class="fab fa-apple"></i>
            Apple
          </button>
        </div>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html" id="go-to-register">Create one free</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
